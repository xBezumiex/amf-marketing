<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<title>Лидогенерация — АМФ-маркетинг</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Настройка лидогенерации: связка сайта, рекламы, аналитики и воронки. АМФ-маркетинг.">
	<link href="https://fonts.googleapis.com/css?family=Pacifico|Raleway:400,700,900" rel="stylesheet">
	<link rel="stylesheet" href="../css/style.css">
	<style>
		.wip-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px 20px; }
		.wip-page h1 { font-size: 36px; font-weight: 900; margin-bottom: 16px; }
		.wip-page p { font-size: 18px; color: #555; margin-bottom: 32px; }
		.wip-page .back-link { color: #ff7105; font-size: 16px; text-decoration: none; border-bottom: 1px solid #ff7105; }
		.wip-page .back-link:hover { color: #6e2d1f; border-color: #6e2d1f; }
	
	/* Cookie Banner */
	#cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; background: #1c1c1c; color: #ddd; z-index: 99999; padding: 16px 20px; font-family: 'Raleway', sans-serif; font-size: 14px; line-height: 1.6; box-shadow: 0 -4px 20px rgba(0,0,0,.4); transform: translateY(100%); transition: transform .4s ease; }
	#cookie-banner.cookie--show { transform: translateY(0); }
	.cookie-inner { max-width: 1140px; margin: 0 auto; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
	.cookie-text { flex: 1; min-width: 200px; }
	.cookie-text a { color: #b7780e; text-decoration: underline; }
	.cookie-btns { display: flex; gap: 10px; flex-shrink: 0; }
	.cookie-btn-ok { background: #b7780e; color: #fff; border: none; padding: 10px 24px; font-family: 'Raleway',sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 4px; }
	.cookie-btn-ok:hover { background: #9a6409; }
	.cookie-btn-no { background: transparent; color: #aaa; border: 1px solid #555; padding: 10px 24px; font-family: 'Raleway',sans-serif; font-size: 14px; cursor: pointer; border-radius: 4px; }
	.cookie-btn-no:hover { color: #fff; border-color: #999; }
	@media (max-width: 600px) { .cookie-inner { flex-direction: column; } .cookie-btns { width: 100%; } .cookie-btn-ok, .cookie-btn-no { flex: 1; text-align: center; min-height: 44px; } }
	</style>
</head>
<body>
<!-- Cookie Banner -->
<div id="cookie-banner" role="dialog" aria-label="Уведомление о cookies">
	<div class="cookie-inner">
		<p class="cookie-text">Мы используем cookies и сервисы аналитики, чтобы улучшать работу сайта. Продолжая пользоваться сайтом или нажимая «Согласен», вы соглашаетесь с использованием cookies.</p>
		<div class="cookie-btns">
			<button class="cookie-btn-ok" id="cookie-accept">Согласен</button>
			<button class="cookie-btn-no" id="cookie-decline">Отказаться</button>
		</div>
	</div>
</div>

	<div class="wip-page">
		<h1>Лидогенерация</h1>
		<p>Страница в разработке</p>
		<a href="/" class="back-link">← Вернуться на главную</a>
	</div>

<!-- Cookie Banner -->
<script>
(function () {
	var KEY = 'amf_cookie_choice';
	var banner = document.getElementById('cookie-banner');
	function getChoice() { return localStorage.getItem(KEY); }
	function saveChoice(val) {
		localStorage.setItem(KEY, val);
		var d = new Date(); d.setTime(d.getTime() + 365*24*60*60*1000);
		document.cookie = KEY + '=' + val + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
	}
	function showBanner() { setTimeout(function(){ banner.classList.add('cookie--show'); }, 800); }
	function hideBanner() { banner.classList.remove('cookie--show'); }
	if (!getChoice()) showBanner();
	document.getElementById('cookie-accept').addEventListener('click', function(){ saveChoice('accepted'); hideBanner(); });
	document.getElementById('cookie-decline').addEventListener('click', function(){ saveChoice('declined'); hideBanner(); });
})();
</script>
</body>
</html>
